services:
  - type: web
    name: pawpal-server
    runtime: node
    region: singapore
    plan: free
    buildCommand: bash build.sh
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: 'true'
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL
        value: deepseek-chat
      - key: ENCRYPTION_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: uploads
      - key: CORS_ORIGIN
        value: '*'
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE
        value: '52428800'
      - key: AI_RATE_LIMIT_PER_HOUR
        value: '20'
      - key: AUTH_RATE_LIMIT_PER_15MIN
        value: '10'
